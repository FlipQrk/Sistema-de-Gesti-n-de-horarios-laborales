# ====================================================================
# CONFIGURACIÓN - PRODUCCIÓN
# ====================================================================
# Se activa con: --spring.profiles.active=production
# o con variable de entorno: SPRING_PROFILES_ACTIVE=production
# ====================================================================

# ====================================================================
# 1. INFORMACIÓN DE LA APLICACIÓN
# ====================================================================
server.port=8080
server.servlet.context-path=/api

# ====================================================================
# 2. BASE DE DATOS - POSTGRESQL (PRODUCCIÓN)
# ====================================================================
# Conectar a PostgreSQL en servidor remoto
# Las credenciales deben venir de variables de entorno
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/schedulingdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driverClassName=org.postgresql.Driver

# ====================================================================
# 3. JPA / HIBERNATE
# ====================================================================
# En producción NO usar create-drop
# validate: Solo valida sin cambiar el esquema
spring.jpa.hibernate.ddl-auto=validate

# NO mostrar SQL en producción (rendimiento)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Dialect PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====================================================================
# 4. LOGGING - PRODUCCIÓN
# ====================================================================
# Solo INFO y ERROR en producción
logging.level.root=INFO
logging.level.com.mis.mis=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Archivos de logs
logging.file.name=/var/log/scheduling-system/application.log
logging.file.max-size=100MB
logging.file.max-history=30

# ====================================================================
# 5. SEGURIDAD - JWT
# ====================================================================
# IMPORTANTE: Cambiar en producción (usar variables de entorno)
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=86400000

# ====================================================================
# 6. SWAGGER/OPENAPI - DESACTIVADO EN PRODUCCIÓN
# ====================================================================
# Deshabilitar documentación en producción por seguridad
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ====================================================================
# 7. JSON
# ====================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.deserialization.fail-on-unknown-properties=false

# ====================================================================
# 8. SESIÓN
# ====================================================================
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# ====================================================================
# 9. PERFORMANCE - OPTIMIZADO
# ====================================================================
# Connection pool más grande para producción
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Batch processing
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ====================================================================
# 10. ERRORES - INFORMACIÓN LIMITADA
# ====================================================================
# NO mostrar stack traces en producción
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never

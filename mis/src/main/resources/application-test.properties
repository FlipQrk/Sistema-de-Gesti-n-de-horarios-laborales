# ====================================================================
# CONFIGURACIÓN - TESTING
# ====================================================================
# Se activa automáticamente cuando se ejecutan tests
# O con: --spring.profiles.active=test
# ====================================================================

# ====================================================================
# 1. BASE DE DATOS - H2 EN MEMORIA (AISLADA PARA TESTS)
# ====================================================================
# Base de datos completamente en memoria para tests rápidos
# Aislada de la BD de desarrollo
spring.datasource.url=jdbc:h2:mem:test-schedulingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Modo compatibilidad 
spring.datasource.hikari.maximum-pool-size=3
spring.h2.console.enabled=false

# ====================================================================
# 2. JPA / HIBERNATE
# ====================================================================
# create-drop es ideal para tests (limpia después de cada test)
spring.jpa.hibernate.ddl-auto=create-drop

# Mostrar SQL para debugging en tests
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ====================================================================
# 3. LOGGING
# ====================================================================
# Level DEBUG para tests
logging.level.root=WARN
logging.level.com.mis.mis=DEBUG
logging.level.org.springframework.test=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# No escribir logs a archivos en tests
logging.file.name=

# ====================================================================
# 4. SEGURIDAD
# ====================================================================
# Clave de prueba
app.jwt.secret=test_secret_key_1234567890_123456
app.jwt.expiration=3600000

# ====================================================================
# 5. SWAGGER
# ====================================================================
# Deshabilitar en tests
springdoc.swagger-ui.enabled=false

# ====================================================================
# 6. JSON
# ====================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ====================================================================
# 7. ERRORES
# ====================================================================
server.error.include-stacktrace=always
server.error.include-message=always

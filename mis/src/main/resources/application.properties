# ====================================================================
# CONFIGURACIÓN - SISTEMA DE GESTIÓN DE HORARIOS LABORALES
# ====================================================================
# Fecha: 2026-03-23
# Versión: 1.0
# Descripción: Configuración centralizada para desarrollo y producción
# ====================================================================

# ====================================================================
# 1. INFORMACIÓN DE LA APLICACIÓN
# ====================================================================
spring.application.name=Sistema de Horarios Laborales
server.port=8080
server.servlet.context-path=/api

# ====================================================================
# 2. CONFIGURACIÓN DE BASE DE DATOS
# ====================================================================
# NOTA: Por defecto ahora usa PostgreSQL en Docker
# Para usar H2 en memoria, descomentar la sección H2
# y comentar la sección PostgreSQL

# ---- PostgreSQL (Desarrollo con Docker - DEFAULT) ----
# Conecta a contenedor Docker levantado con docker-compose up
# Antes de ejecutar, correr:
#   cd mis/
#   docker-compose up -d
spring.datasource.url=jdbc:postgresql://localhost:5432/schedulingdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---- H2 Database (Alternativa para testing sin Docker) ----
# Descomenta esta sección para usar H2 en lugar de PostgreSQL
# Comenta la sección PostgreSQL arriba
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ====================================================================
# 3. CONFIGURACIÓN JPA / HIBERNATE
# ====================================================================
# Estrategia de generación de esquema automático
# update: Actualiza el esquema sin perder datos (recomendado con Docker)
# create-drop: Crea y limpia en cada inicio (solo para testing puro)
# validate: Solo valida la estructura (recomendado para producción)
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en logs (útil para debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Estrategia de naming para columnas (snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Dialect de Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Batch processing para mejor rendimiento
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ====================================================================
# 4. CONFIGURACIÓN DE LOGGING
# ====================================================================
# Nivel de log global
logging.level.root=INFO

# Niveles específicos por paquete
logging.level.com.mis.mis=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Formato de logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Archivo de logs
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# ====================================================================
# 5. CONFIGURACIÓN SPRING SECURITY & JWT
# ====================================================================
# Clave secreta para firmar JWT (CAMBIAR EN PRODUCCIÓN)
# Mínimo 32 caracteres para HS256
app.jwt.secret=mi_clave_secreta_super_segura_para_jwt_desarrollo_cambiar_en_produccion
app.jwt.expiration=86400000

# Rol por defecto para nuevos usuarios
app.default.role=ROLE_EMPLOYEE

# ====================================================================
# 6. CONFIGURACIÓN SWAGGER / OPENAPI
# ====================================================================
# Ruta para acceder a Swagger UI
# http://localhost:8080/api/swagger-ui.html
# http://localhost:8080/api/v3/api-docs

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true

# ====================================================================
# 7. CONFIGURACIÓN DE VALIDACIÓN
# ====================================================================
# Tolerancia de minutos para detectar retrasos
app.lateness.tolerance.minutes=5

# Horas máximas de trabajo para detectar errores
app.max.work.hours.per.day=12

# ====================================================================
# 8. CONFIGURACIÓN JSON
# ====================================================================
# Formato de serialización de LocalDateTime y LocalDate
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota

# Evitar errores con propiedades desconocidas
spring.jackson.deserialization.fail-on-unknown-properties=false

# ====================================================================
# 9. CONFIGURACIÓN DE SESIÓN
# ====================================================================
# Nombre de la cookie de sesión
server.servlet.session.cookie.name=SCHEDULING_SESSION
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Timeout de sesión (30 minutos)
server.servlet.session.timeout=30m

# ====================================================================
# 10. CONFIGURATION DE PERFORMANCE
# ====================================================================
# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ====================================================================
# 11. CONFIGURACIÓN DE ERRORES
# ====================================================================
# Mostrar stack trace en errores (solo desarrollo)
server.error.include-stacktrace=on_param
server.error.include-message=always
server.error.include-binding-errors=always

# ====================================================================
# 12. VARIABLES DE ENTORNO (OVERRIDE)
# ====================================================================
# Estas pueden ser sobrescritas por variables de entorno del sistema
# Ejemplo en terminal:
#   export SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/db
#   java -jar application.jar

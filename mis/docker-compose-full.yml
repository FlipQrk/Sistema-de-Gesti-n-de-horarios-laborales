version: '3.8'

# ====================================================================
# DOCKER COMPOSE - STACK COMPLETO (BD + APP)
# ====================================================================
# Este archivo es para cuando quieras containerizar la aplicación también
# No es necesario para desarrollo (Spring Boot en local es más rápido)
# 
# Uso:
#   1. Compilar JAR: mvn clean package -DskipTests
#   2. Construir imagen: docker build -t scheduling-app:1.0 .
#   3. Ejecutar: docker-compose -f docker-compose-full.yml up -d
#
# O usar el docker-compose.yml simple que solo tiene PostgreSQL
# ====================================================================

services:
  # ====================================================================
  # POSTGRESQL 15
  # ====================================================================
  postgres:
    image: postgres:15-alpine
    container_name: scheduling_postgres
    
    ports:
      - "5432:5432"
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: schedulingdb
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    networks:
      - scheduling_network
    
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ====================================================================
  # SPRING BOOT APPLICATION
  # ====================================================================
  # NOTA: Descomentar solo si quieres containerizar la app también
  # Para desarrollo, mejor ejecutar 'mvn spring-boot:run' en local
  
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: scheduling_app
  #   
  #   ports:
  #     - "8080:8080"
  #   
  #   environment:
  #     # Conectar a BD en el mismo network usando nombre del servicio
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/schedulingdb
  #     SPRING_DATASOURCE_USERNAME: postgres
  #     SPRING_DATASOURCE_PASSWORD: postgres123
  #     SPRING_JPA_HIBERNATE_DDL_AUTO: update
  #     SPRING_PROFILES_ACTIVE: production
  #   
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   
  #   networks:
  #     - scheduling_network
  #   
  #   logging:
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  # ====================================================================
  # PGADMIN 4 (Interfaz gráfica)
  # ====================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scheduling_pgadmin
    
    ports:
      - "5050:80"
    
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@schedulingdb.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    
    depends_on:
      postgres:
        condition: service_healthy
    
    networks:
      - scheduling_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  scheduling_network:
    driver: bridge
